

<script>
	const IMG_RE = /\.(png|jpe?g|gif|webp|heic|avif|jxl|svg)$/i;

	var pathElement = document.querySelector("h1");
	let titleDiv = document.getElementById("title");
	if (titleDiv && pathElement)
		titleDiv.prepend(pathElement);

	// get the path from the default "index of /nani/nani" string
	var pathName = pathElement.innerHTML;
	var pathPrefix = "Index of ";
	if (pathName.startsWith(pathPrefix)) {
		var fullPath = pathName.slice(pathPrefix.length).trim();
		// remove trailing slash
		if (fullPath.endsWith("/"))
			fullPath = fullPath.slice(0, -1);
		var segments = fullPath.split("/");
		var breadcrumbs = [];
		var currentPath = "";
		breadcrumbs.push('<a href="/">root</a>');
		for (let i = 1; i < segments.length; i++) {
			currentPath += "/" + segments[i];
			if (i < segments.length - 1)
				breadcrumbs.push(`<a href="${currentPath}/">${segments[i]}</a>`);
			else if (segments[i])
				breadcrumbs.push(`<span>${segments[i]}</span>`);
		}
		if (segments.length === 1 && segments[0] === "")
			breadcrumbs = ['<span>nas autoindex</span>'];
		pathElement.innerHTML = breadcrumbs.join("/");
	}

	var fileCount = 0,
		dirCount = 0,
		dirStatElem = document.getElementById("dir-stats"),
		fileStatElem = document.getElementById("file-stats");

	// hover preview stuff
	let previewElement = document.createElement("div");
	previewElement.id = "img_preview";
	document.body.appendChild(previewElement);
	// cache for loaded images
	let imgCache = new Map();

	// get all links only from the actual list (within pre tag)
	let preElement = document.querySelector("pre");
	let allLinks = preElement ? preElement.getElementsByTagName("a") : [];

	var parentFolderElement = document.querySelector("a[href='../']");

	// remove ../ if 
	if (parentFolderElement && window.location.pathname === "/") {
		let pre = parentFolderElement.parentElement;
		parentFolderElement.remove();
		// remove dumbass whitespace
		if (pre && pre.tagName === "PRE")
			pre.innerHTML = pre.innerHTML.replace(/^\s+/, "");
	}

	let i = 0;
	for (let item of allLinks) {
		item.innerText = `${String(i++).padStart(String(allLinks.length).length, " ")}  ${item.innerText}`;
		if (item.innerHTML.endsWith("/")) {
			if (item.getAttribute("href") !== "../") dirCount += 1;
			item.className = "directory";
		} else if (!item.innerHTML.endsWith("/")) {
			fileCount += 1;
			item.className = "file";

			// add hover preview for images only
			if (IMG_RE.test(item.href)) {
				item.addEventListener("mouseenter", function (e) {
					let cachedImg = imgCache.get(this.href);

					// cache if not cached
					if (!cachedImg) {
						cachedImg = document.createElement("img");
						cachedImg.src = this.href;
						cachedImg.alt = "image preview";
						imgCache.set(this.href, cachedImg);
					}

					previewElement.innerHTML = "";
					previewElement.appendChild(cachedImg);
					previewElement.style.display = "block";
				});
				item.addEventListener("mousemove", function (e) {
					previewElement.style.left = e.pageX + 16 + "px";
					previewElement.style.top = e.pageY + 16 + "px";
				});
				item.addEventListener("mouseleave", function (e) {
					previewElement.style.display = "none";
				});
			}
		}
	}

	dirStatElem.innerHTML = dirCount + (dirCount !== 1 ? " directories" : " directory");
	fileStatElem.innerHTML = fileCount + (fileCount !== 1 ? " files" : " file");
</script>
</body>
</html>
